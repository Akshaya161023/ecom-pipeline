version: "3.8"

services:

  # ─────────────────────────────────────────────
  # Zookeeper — Kafka coordination
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_INIT_LIMIT: 5
      ZOOKEEPER_SYNC_LIMIT: 2
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/2181 && echo -e 'ruok' >&3 && cat <&3 | grep -q imok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ─────────────────────────────────────────────
  # Kafka — Message broker
  # ─────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 1073741824   # 1 GB
      KAFKA_LOG_SEGMENT_BYTES: 536870912      # 512 MB
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # ─────────────────────────────────────────────
  # MongoDB — Storage + Change Streams (rs0)
  # ─────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Enable replica set so MongoDB Change Streams work
    command: ["--replSet", "rs0", "--bind_ip_all"]
    healthcheck:
      test:
        ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  # ─────────────────────────────────────────────
  # Mongo-Init — One-shot replica set initialiser
  # Exits with code 0 after rs.initiate() succeeds
  # ─────────────────────────────────────────────
  mongo-init:
    image: mongo:7.0
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongodb:27017 --quiet --eval "
          try {
            rs.status();
            print('Replica set already initialised — skipping.');
          } catch(e) {
            rs.initiate({
              _id: 'rs0',
              members: [{ _id: 0, host: 'mongodb:27017' }]
            });
            print('Replica set rs0 initialised successfully.');
          }
        "

# ─────────────────────────────────────────────
# Named volumes
# ─────────────────────────────────────────────
volumes:
  mongo_data:
    driver: local
